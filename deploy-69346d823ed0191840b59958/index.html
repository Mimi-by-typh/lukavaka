<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Подключение библиотеки Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>Lika Frizz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Анимированный фон с хештегами -->
    <div id="backgroundCanvas"></div>
    
    <!-- Основная контейнер -->
    <main class="main-container">
        <!-- Центральная карточка -->
        <section class="main-card">
            <div class="card-border">
                <div class="card-content">
                    <!-- Визуализация лавовой лампы -->
                    <canvas id="lavaLamp" class="lava-lamp"></canvas>
                    
                    <!-- Контент карточки -->
                    <div class="content-overlay">
                        <h1 class="title">Lika Frizz</h1>
                        <div class="description">
                            <p>Атмосферное пространство для творчества и вдохновения</p>
                            <p>Погрузись в мир уникальных визуальных эффектов и интерактивности</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Система авторизации -->
        <section class="auth-section">
            <div id="authButtons" class="auth-buttons">
                <!-- Контейнер для кнопки Google Sign-In -->
                <div id="googleSignInButton"></div>
            </div>
            
            <div id="userInfo" class="user-info" style="display: none;">
                <a href="#" id="profileLink" class="profile-link">
                    <img id="userAvatar" src="" alt="Avatar" class="user-avatar">
                    <span id="userName" class="user-name"></span>
                </a>
                <button id="logoutBtn" class="logout-btn">Выйти</button>
            </div>
        </section>
        
        <!-- Страница профиля пользователя (изначально скрыта) -->
        <section id="profileSection" class="profile-section" style="display: none;">
            <div class="profile-card">
                <h2 class="profile-title">Профиль пользователя</h2>
                <img id="profileAvatar" src="" alt="User Avatar" class="profile-avatar-large">
                <div class="profile-info">
                    <p><strong>Имя:</strong> <span id="profileName"></span></p>
                    <p><strong>Email:</strong> <span id="profileEmail"></span></p>
                </div>
                <div class="profile-actions">
                    <button id="backToMainBtn" class="back-btn">На главную</button>
                    <button id="profileLogoutBtn" class="logout-btn">Выйти</button>
                </div>
            </div>
        </section>

        <!-- Система комментариев -->
        <section class="comments-section">
            <h2 class="comments-title">Комментарии</h2>
            
            <!-- Форма добавления комментария -->
            <div id="commentForm" class="comment-form" style="display: none;">
                <textarea id="commentInput" placeholder="Напишите комментарий..." class="comment-input"></textarea>
                <button id="submitComment" class="submit-btn">Отправить</button>
            </div>
            
            <!-- Предложение войти для неавторизованных -->
            <div id="loginPrompt" class="login-prompt">
                <p>Для написания комментариев необходимо <a href="#" id="promptLogin">войти</a></p>
            </div>
            
            <!-- Список комментариев -->
            <div id="commentsList" class="comments-list"></div>
        </section>
    </main>
    
    <!-- Индикатор онлайн пользователей -->
    <div class="online-indicator">
        <span class="online-text">Онлайн: <span id="onlineCount">0</span></span>
    </div>
    
    <!-- Подключение скриптов -->
    <script src="script.js"></script>
</body>
</html>
